# GitLab CI — FE build with BugSink source-map injection.
# Place at .gitlab-ci.yml in your FE repo.

stages:
  - build
  - image
  - deploy

variables:
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

build:
  stage: build
  image: node:20
  cache:
    paths: [node_modules/]
  script:
    - npm ci
    - npm run build
    - curl -sL https://sentry.io/get-cli/ | sh
    - sentry-cli sourcemaps inject ./dist
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

image:
  stage: image
  image: docker:24
  services:
    - docker:24-dind
  dependencies: [build]
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE:$IMAGE_TAG" .
    - docker push "$CI_REGISTRY_IMAGE:$IMAGE_TAG"

# Optional: upload source maps from CI (needs GitLab runner IP in WAF allowlist).
