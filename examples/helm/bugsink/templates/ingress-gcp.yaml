{{- if and .Values.ingress.enabled (eq .Values.ingress.cloud "gcp") }}
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: {{ .Release.Name }}-backend-config
  namespace: {{ .Values.namespace }}
spec:
  {{- with .Values.ingress.gcp.cloudArmorPolicy }}
  securityPolicy:
    name: {{ . | quote }}
  {{- end }}
  healthCheck:
    {{- toYaml .Values.ingress.gcp.backendConfig.healthCheck | nindent 4 }}
    port: 8000
    type: HTTP
---
{{- if .Values.ingress.gcp.managedCert }}
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: {{ .Release.Name }}-cert
  namespace: {{ .Values.namespace }}
spec:
  domains:
  - {{ .Values.ingress.host | quote }}
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bugsink.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: gce
    kubernetes.io/ingress.allow-http: "true"
    {{- with .Values.ingress.gcp.globalStaticIpName }}
    kubernetes.io/ingress.global-static-ip-name: {{ . | quote }}
    {{- end }}
    {{- if .Values.ingress.gcp.managedCert }}
    networking.gke.io/managed-certificates: {{ .Release.Name }}-cert
    {{- end }}
spec:
  rules:
  - host: {{ .Values.ingress.host | quote }}
    http:
      paths:
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: {{ .Release.Name }}
            port:
              number: 80
{{- end }}
