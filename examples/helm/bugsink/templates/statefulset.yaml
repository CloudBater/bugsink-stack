apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bugsink.labels" . | nindent 4 }}
spec:
  serviceName: {{ .Release.Name }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "bugsink.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bugsink.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "bugsink.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
      - name: chown-data
        image: busybox:1.36
        command: ["sh", "-c", "chown -R 14237:14237 /data"]
        volumeMounts:
        - name: bugsink-data
          mountPath: /data
      containers:
      - name: bugsink
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secret
              key: DB_PASSWORD
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secret
              key: SECRET_KEY
        - name: DATABASE_URL
          value: {{ include "bugsink.databaseUrl" . | quote }}
        - name: BASE_URL
          value: {{ .Values.bugsink.baseUrl | quote }}
        - name: ALLOWED_HOSTS
          value: {{ .Values.bugsink.allowedHosts | quote }}
        - name: X_FORWARDED_FOR_PROXY_COUNT
          value: {{ .Values.bugsink.proxyCount | quote }}
        - name: PORT
          value: "8000"
        - name: GUNICORN_WORKERS
          value: {{ .Values.bugsink.gunicornWorkers | quote }}
        ports:
        - containerPort: 8000
          name: http
        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /accounts/login/
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: bugsink-data
          mountPath: /data

      {{- if .Values.database.gcp.enabled }}
      - name: cloud-sql-proxy
        image: {{ .Values.database.gcp.proxy.image }}
        args:
        - --private-ip
        - --port=5432
        - {{ .Values.database.gcp.instanceConnectionName }}
        securityContext:
          runAsNonRoot: true
        resources:
          {{- toYaml .Values.database.gcp.proxy.resources | nindent 10 }}
      {{- end }}

  volumeClaimTemplates:
  - metadata:
      name: bugsink-data
    spec:
      accessModes: ["ReadWriteOnce"]
      {{- with .Values.persistence.storageClassName }}
      storageClassName: {{ . | quote }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.persistence.size }}
