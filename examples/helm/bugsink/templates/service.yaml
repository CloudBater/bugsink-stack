apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bugsink.labels" . | nindent 4 }}
  annotations:
    {{- if eq .Values.ingress.cloud "gcp" }}
    # Declared explicitly so helm upgrade doesn't strip it (see docs/14-gotchas-gcp.md)
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "{{ .Release.Name }}-backend-config"}'
    {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "bugsink.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
