---
apiVersion: v1
kind: Service
metadata:
  name: bugsink
  namespace: bugsink
  labels:
    app: bugsink
  annotations:
    # GKE: declare NEG annotation explicitly so Helm upgrades don't strip it
    # (see docs/14-gotchas-gcp.md). Harmless on EKS.
    cloud.google.com/neg: '{"ingress": true}'
    # GKE: attach BackendConfig for Cloud Armor + healthcheck config
    cloud.google.com/backend-config: '{"default": "bugsink-backend-config"}'
spec:
  type: ClusterIP
  selector:
    app: bugsink
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
