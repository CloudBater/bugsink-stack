---
# Requires External Secrets Operator (https://external-secrets.io/).
# Pick ONE SecretStore (GCP or AWS) and delete the other block.

# --- GCP Secret Manager ---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: bugsink-gcp-sm
  namespace: bugsink
spec:
  provider:
    gcpsm:
      projectID: <PROJECT_ID>  # <CHANGE_ME>
      auth:
        workloadIdentity:
          clusterLocation: <REGION>  # <CHANGE_ME>
          clusterName: <CLUSTER_NAME>  # <CHANGE_ME>
          serviceAccountRef:
            name: bugsink
---
# --- AWS Secrets Manager ---
# apiVersion: external-secrets.io/v1beta1
# kind: SecretStore
# metadata:
#   name: bugsink-aws-sm
#   namespace: bugsink
# spec:
#   provider:
#     aws:
#       service: SecretsManager
#       region: us-east-1
#       auth:
#         jwt:
#           serviceAccountRef:
#             name: bugsink
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: bugsink-secrets
  namespace: bugsink
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bugsink-gcp-sm  # or bugsink-aws-sm
    kind: SecretStore
  target:
    name: bugsink-secret
    creationPolicy: Merge  # allows Helm to own other fields on the same Secret
  data:
  - secretKey: SECRET_KEY
    remoteRef:
      key: bugsink-secret-key  # GCP Secret Manager key OR AWS secret name
  - secretKey: DB_PASSWORD
    remoteRef:
      key: bugsink-db-password
