---
# BugSink StatefulSet
# Uses a PVC for event files (source maps, attachments).
# Postgres is external (Cloud SQL via proxy sidecar, or RDS via direct URL).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bugsink
  namespace: bugsink
  labels:
    app: bugsink
spec:
  serviceName: bugsink
  replicas: 1
  selector:
    matchLabels:
      app: bugsink
  template:
    metadata:
      labels:
        app: bugsink
    spec:
      serviceAccountName: bugsink
      securityContext:
        fsGroup: 14237  # BugSink image runs as UID 14237
      initContainers:
      - name: chown-data
        image: busybox:1.36
        command: ["sh", "-c", "chown -R 14237:14237 /data"]
        volumeMounts:
        - name: bugsink-data
          mountPath: /data
      containers:
      - name: bugsink
        image: bugsink/bugsink:2.1.2
        imagePullPolicy: IfNotPresent
        env:
        # --- Order matters: secret-sourced vars must come BEFORE composite vars ---
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bugsink-secret
              key: DB_PASSWORD
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: bugsink-secret
              key: SECRET_KEY
        - name: DATABASE_URL
          value: "postgres://bugsink:$(DB_PASSWORD)@127.0.0.1:5432/bugsink"  # GCP (via sidecar)
          # value: "postgres://bugsink:$(DB_PASSWORD)@<RDS_ENDPOINT>:5432/bugsink"  # AWS
        - name: BASE_URL
          value: "https://bugsink.example.com"  # <CHANGE_ME>
        - name: ALLOWED_HOSTS
          value: "*"  # GCP LB health check quirk — see docs/13-gotchas.md
          # For AWS ALB with healthcheck Hostname set, you can restrict to real domain.
        - name: X_FORWARDED_FOR_PROXY_COUNT
          value: "2"  # GCP LB prepends its IP; "1" for AWS ALB
        - name: PORT
          value: "8000"
        - name: GUNICORN_WORKERS
          value: "4"
        ports:
        - containerPort: 8000
          name: http
        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /accounts/login/
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 768Mi
        volumeMounts:
        - name: bugsink-data
          mountPath: /data

      # Cloud SQL Auth Proxy sidecar (GCP only — remove for AWS)
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0
        args:
        - --private-ip
        - --port=5432
        - <PROJECT_ID>:<REGION>:<INSTANCE_NAME>  # <CHANGE_ME>
        securityContext:
          runAsNonRoot: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

  volumeClaimTemplates:
  - metadata:
      name: bugsink-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
      # storageClassName: standard-rwo   # GKE
      # storageClassName: gp3            # EKS
